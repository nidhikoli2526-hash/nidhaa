<!DOCTYPE html>
<html>
<head>
    <title>AJAX Search Suggestion</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        #suggestions {
            border: 1px solid #ccc;
            max-width: 200px;
            display: none;
        }

        .item {
            padding: 5px;
            cursor: pointer;
        }

        .item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <h2>Search Box</h2>

    <input type="text" id="search" placeholder="Type to search..." autocomplete="off">
    
    <div id="suggestions"></div>

    <script>
        $(document).ready(function() {

            $("#search").keyup(function() {
                var query = $(this).val();

                if (query.length > 0) {
                    $.ajax({
                        url: "search.php",
                        method: "POST",
                        data: { search: query },
                        success: function(data) {
                            $("#suggestions").html(data);
                            $("#suggestions").show();
                        }
                    });
                } else {
                    $("#suggestions").hide();
                }
            });

            // Click suggestion
            $(document).on("click", ".item", function() {
                $("#search").val($(this).text());
                $("#suggestions").hide();
            });

        });
    </script>

</body>
</html>

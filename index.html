<?php
session_start();

$user = "admin";
$pass = "1234";

if(isset($_POST['login'])){
    $username = $_POST['username'];
    $password = $_POST['password'];

    if($username == $user && $password == $pass){
        $_SESSION['user'] = $username;
    } else {
        echo "Invalid Username or Password<br>";
    }
}

if(isset($_GET['logout'])){
    session_destroy();
    header("Location: index.php");
}

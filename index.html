import React from "react";

function Header({ title }) {
  return <h1>{title}</h1>;
}

function UserCard({ name, age }) {
  return (
    <div>
      <h3>{name}</h3>
      <p>Age: {age}</p>
    </div>
  );
}

function App() {
  return (
    <div>
      <Header title="My React App" />
      <UserCard name="Abhay" age={21} />
      <UserCard name="Rahul" age={22} />
    </div>
  );
}

export default App;

<?php
session_start();

/* USER DATA (example user) */
$valid_user = "admin";

/* hashed password for: 12345 */
$valid_hash = "$2y$10$wHc9kU4uFJYk6y9q7uP8TeqE6G4eZ7sJt7z6t0W4k7sP9bL6yH9O2";

/* LOGIN PROCESS */
if(isset($_POST['login'])){

    $user = trim($_POST['userid']);
    $pass = trim($_POST['password']);

    if($user === $valid_user && password_verify($pass,$valid_hash)){
        $_SESSION['user']=$user;
        header("Location: ".$_SERVER['PHP_SELF']);
        exit();
    }else{
        $error="Login Failed";
    }
}

/* LOGOUT */
if(isset($_GET['logout'])){
    session_destroy();
    header("Location: ".$_SERVER['PHP_SELF']);
    exit();
}
?>

<!DOCTYPE html>

<head>
<title>PHP Login</title>

<body>

<h3>Welcome <?php echo $_SESSION['user']; ?></h3>

<a href="?logout=true">Logout</a>

<?php } else { ?>

}
?>
